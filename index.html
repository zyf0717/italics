<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Italics Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app" aria-label="Italic text generator">

    <!-- Tab bar -->
    <nav class="tabs" role="tablist" aria-label="Tool tabs">
      <button class="tab-btn" role="tab" data-tab="italics"  aria-selected="true">Italics</button>
      <button class="tab-btn" role="tab" data-tab="metadata" aria-selected="false">Metadata</button>
    </nav>

    <!-- Tab 1 · Italics -->
    <section id="tab-italics" class="tab-panel" role="tabpanel" aria-labelledby="tab-italics">
      <div class="italics-layout">
        <div>
          <label for="input">Enter text</label>
          <textarea id="input" placeholder="Type here..."></textarea>
        </div>
        <div>
          <label for="output">Italicized output</label>
          <textarea id="output" readonly></textarea>
        </div>
        <button id="copyBtn" type="button">Copy output</button>
      </div>
    </section>

    <!-- Tab 2 · Metadata -->
    <section id="tab-metadata" class="tab-panel" role="tabpanel" aria-labelledby="tab-metadata">

      <div class="metadata-grid">
        <div class="meta-card">
          <div class="meta-label">Characters</div>
          <div class="meta-value" id="meta-chars">0</div>
        </div>
        <div class="meta-card">
          <div class="meta-label">Words</div>
          <div class="meta-value" id="meta-words">0</div>
        </div>
        <div class="meta-card">
          <div class="meta-label">Lines</div>
          <div class="meta-value" id="meta-lines">0</div>
        </div>
        <div class="meta-card">
          <div class="meta-label">Converted</div>
          <div class="meta-value" id="meta-converted">0</div>
        </div>
      </div>

      <div class="meta-breakdown">
        <table>
          <thead>
            <tr>
              <th>Type</th>
              <th>Count</th>
              <th>Share</th>
            </tr>
          </thead>
          <tbody id="meta-tbody"></tbody>
        </table>
      </div>
      <p class="meta-empty" id="meta-empty">Type something in the Italics tab to see statistics.</p>

    </section>

  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
