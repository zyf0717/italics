<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Italics Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app" aria-label="Italic text generator">

    <!-- Tab bar -->
    <nav class="tabs" role="tablist" aria-label="Tool tabs">
      <button class="tab-btn" role="tab" data-tab="italics"  aria-selected="true">Italics</button>
      <button class="tab-btn" role="tab" data-tab="metadata" aria-selected="false">Metadata</button>
    </nav>

    <!-- Tab 1 · Italics -->
    <section id="tab-italics" class="tab-panel" role="tabpanel" aria-labelledby="tab-italics">
      <div class="italics-layout">
        <div>
          <label for="input">Enter text</label>
          <textarea id="input" placeholder="Type here..."></textarea>
        </div>
        <div>
          <label for="output">Italicized output</label>
          <textarea id="output" readonly></textarea>
        </div>
        <button id="copyBtn" type="button">Copy output</button>
      </div>
    </section>

    <!-- Tab 2 · Metadata -->
    <section id="tab-metadata" class="tab-panel" role="tabpanel" aria-labelledby="tab-metadata">
      <div class="meta-layout">

        <div id="meta-dropzone" class="meta-dropzone" tabindex="0"
             role="button" aria-label="Upload a JPEG image to read its metadata">
          <span class="meta-drop-text">Click or drop a <strong>JPG</strong> image here</span>
          <input id="meta-file" type="file" accept=".jpg,.jpeg,image/jpeg" hidden>
        </div>

        <p id="meta-status" class="meta-status">No image loaded.</p>

        <div class="meta-summary-wrap">
          <label for="meta-summary">Settings</label>
          <textarea id="meta-summary" readonly placeholder="Settings will appear here…"></textarea>
        </div>

        <div class="meta-toggles">
          <label class="tog-label"><input type="checkbox" id="tog-location" checked> Location</label>
          <label class="tog-label"><input type="checkbox" id="tog-gear"     checked> Gear</label>
          <label class="tog-label"><input type="checkbox" id="tog-tags"     checked> Tags</label>
          <span class="tog-sep"></span>
          <label class="tog-label"><input type="radio" name="tog-platform" id="tog-instagram" checked> Instagram</label>
          <label class="tog-label"><input type="radio" name="tog-platform" id="tog-rednote"> RedNote</label>
        </div>

        <button id="meta-summaryCopyBtn" type="button" disabled>Copy settings</button>

        <div class="meta-output-wrap">
          <label for="meta-output">Full EXIF</label>
          <textarea id="meta-output" readonly placeholder="Metadata will appear here…"></textarea>
        </div>

        <button id="meta-copyBtn" type="button" disabled>Copy EXIF</button>

      </div>
    </section>

  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
